# pytest.ini - Configuração do Pytest
[pytest]
# Diretórios de teste
testpaths = unit
# Padrões de arquivo
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Marcadores
markers =
    P1: Alta prioridade - testes críticos
    P2: Média prioridade - testes importantes
    P3: Baixa prioridade - testes opcionais
    critical: Testes críticos de aceite
    javascript: Testes envolvendo JavaScript
    economy: Testes de economia de tokens
    structure: Testes de preservação de estrutura
    performance: Testes de performance
    output: Testes de output/saída
    piping: Testes de pipes
    error_handling: Testes de tratamento de erros
# Coverage
addopts =
    --verbose
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --tb=short
    --strict-markers
