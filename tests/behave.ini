# behave.ini - Configuração do Behave
[behave]
# Formato de output
format = pretty
# Output file (opcional)
# outfile = reports/behave-report.txt
# Show source in output
show_source = true
# Show timestamps
show_timings = true
# Stop on first failure
# stop = true
# Colors
color = true
# Paths
paths = tests/features
# Parameters
timeout = 30
base_url = https://example.com
